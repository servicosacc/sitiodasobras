// Feriados de Portugal Continental (fixos + Páscoa calculada)
function calcEaster(year) {
  const a = year % 19,
    b = Math.floor(year / 100),
    c = year % 100,
    d = Math.floor(b / 4),
    e = b % 4,
    f = Math.floor((b + 8) / 25),
    g = Math.floor((b - f + 1) / 3),
    h = (19 * a + b - d - g + 15) % 30,
    i = Math.floor(c / 4),
    k = c % 4,
    l = (32 + 2 * e + 2 * i - h - k) % 7,
    m = Math.floor((a + 11 * h + 22 * l) / 451),
    month = Math.floor((h + l - 7 * m + 114) / 31),
    day = (h + l - 7 * m + 114) % 31 + 1;
  return new Date(year, month - 1, day);
}
function getFeriados(year) {
  const e = calcEaster(year);
  // Usa componentes locais para evitar desfasamento UTC (Portugal UTC+1)
  const localStr = dt => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
  const addE = n => {
    const x = new Date(e);
    x.setDate(x.getDate() + n);
    return localStr(x);
  };
  return new Set([`${year}-01-01`, `${year}-04-25`, `${year}-05-01`, `${year}-06-10`, `${year}-08-15`, `${year}-10-05`, `${year}-11-01`, `${year}-12-01`, `${year}-12-08`, `${year}-12-25`, addE(-2),
  // Sexta-feira Santa
  localStr(e),
  // Páscoa
  addE(60) // Corpo de Deus
  ]);
}
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function isWorkday(d) {
  if (d.getDay() === 0 || d.getDay() === 6) return false;
  return !getFeriados(d.getFullYear()).has(localDateStr(d));
}
function addDays(s, n) {
  // Avança n dias úteis (excluindo fins-de-semana e feriados PT)
  if (!s) return s;
  const d = new Date(s + "T12:00:00");
  let count = 0;
  while (count < n) {
    d.setDate(d.getDate() + 1);
    if (isWorkday(d)) count++;
  }
  return d.toISOString().slice(0, 10);
}
function fimObra(o) {
  return addDays(o.inicio, Math.max(0, (o.duracao || 1) - 1));
}
function toDate(s) {
  return new Date(s + "T00:00:00");
}
function fmt(d) {
  if (!d) return "—";
  return toDate(d).toLocaleDateString("pt-PT", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  });
}

    }
  } catch (e) {
    console.warn("handleRedirectPromise:", e.message);
  }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const resp = await msalInstance.acquireTokenSilent({
        scopes,
        account: accounts[0],
        redirectUri
      });
      _accessToken = resp.accessToken;
      return _accessToken;
    } catch (e) {
      _authInProgress = true;
      await msalInstance.acquireTokenRedirect({
        scopes,
        account: accounts[0],
        redirectUri
      });
      return null;
    }
  } else {
    _authInProgress = true;
    await msalInstance.loginRedirect({
      scopes,
      redirectUri
    });
    return null;
  }
}

// ─── GRAPH API — HELPERS ──────────────────────────────────────────────────────
async function graphGet(url) {
  const token = await getAccessToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${url}`, {
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    }
  });
  if (!res.ok) throw new Error(`Graph GET falhou: ${res.status} ${url}`);
  return res.json();
}
async function graphPost(url, body) {
  const token = await getAccessToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${url}`, {
    method: "POST",
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Graph POST falhou: ${res.status} ${url}`);
  return res.json();
}
async function graphPatch(url, body) {
  const token = await getAccessToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${url}`, {
    method: "PATCH",
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Graph PATCH falhou: ${res.status} ${url}`);
  return res.json();
}
async function graphDelete(url) {
  const token = await getAccessToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${url}`, {
    method: "DELETE",
    headers: {
      Authorization: `Bearer ${token}`
    }
  });
  if (!res.ok) throw new Error(`Graph DELETE falhou: ${res.status} ${url}`);
}

// ─── RESOLVER SITE ID E LIST IDs ──────────────────────────────────────────────
async function resolverSiteId() {
  if (_siteId) return _siteId;
  const url = new URL(SP_CONFIG.siteUrl);
  const hostname = url.hostname;
  const sitePath = url.pathname;
  const apiUrl = `/sites/${hostname}:${sitePath}`;
  console.log("Resolving site:", apiUrl);
  const data = await graphGet(apiUrl);
  // O Site ID pode vir no formato "hostname,siteId,webId" — usamos apenas a parte do siteId
  const rawId = data.id;
  console.log("Raw Site ID:", rawId);
  // Formato correcto para chamadas subsequentes é o id completo tal como vem
  _siteId = rawId;
  return _siteId;
}
async function resolverListId(nomeLista) {
  if (_listIds[nomeLista]) return _listIds[nomeLista];
  const siteId = await resolverSiteId();
  const data = await graphGet(`/sites/${siteId}/lists?$select=id,displayName&$top=100`);
  console.log("Listas disponíveis:", data.value?.map(l => l.displayName));
  // Normaliza para comparação: remove espaços extra, converte todos os travessões para hífen simples
  const normalizar = s => s.toLowerCase().trim().replace(/\u2013|\u2014|\u2012/g, "-") // en-dash, em-dash → hífen
  .replace(/\s+/g, " ");
  const nomeNorm = normalizar(nomeLista);
  const lista = data.value?.find(l => normalizar(l.displayName) === nomeNorm);
  if (!lista) throw new Error(`Lista não encontrada: "${nomeLista}". Disponíveis: ${data.value?.map(l => l.displayName).join(", ")}`);
  _listIds[nomeLista] = lista.id;
  return lista.id;
}

// Converte item do SharePoint → obra da app
function spItemParaObra(item) {
  const f = item.fields || {};
  return {
    id: item.id,
    spId: item.id,
    // ID real do SharePoint
    tipo: (f.Categoria || f.Tipo || "particular").toLowerCase() === "sinistro" ? "sinistro" : "particular",
    titulo: f.Title || f.Titulo || "",
    estado: f.Estado === "Agendada" ? "agendada" : f.Estado === "Em Curso" ? "em curso" : f.Estado === "Concluída" ? "concluída" : (f.Estado || "pendente").toLowerCase(),
    inicio: f.DataInicio ? f.DataInicio.slice(0, 10) : "",
    duracao: parseInt(f.Duracao) || 1,
    condominio: f.Condominio || "",
    sinistro: f.NumeroSinistro || "",
    cliente: f.Cliente || "",
    clienteTel: f.ClienteTel || "",
    clienteEmail: f.ClienteEmail || "",
    funcionarios: f.Funcionarios ? f.Funcionarios.split(";").map(x => x.trim()).filter(Boolean) : [],
    especialidades: f.Especialidades ? JSON.parse(f.Especialidades) : [],
    trabalhos: f.Trabalhos ? JSON.parse(f.Trabalhos) : [],
    notas: f.Notas || "",
    morada: f.Morada || ""
  };
}

// Converte obra da app → campos para o SharePoint
function obraParaSPFields(obra) {
  // Nomes das colunas confirmados pelo CSV exportado do SharePoint
  const fields = {
    Title: obra.titulo || "Sem título",
    Categoria: obra.tipo === "sinistro" ? "Sinistro" : "Particular",
    // Mapeia estados da app para os valores exactos na lista SharePoint
    Estado: obra.estado === "em curso" ? "Em curso" : obra.estado === "concluída" ? "Concluída" : obra.estado === "info" ? "Agendada" : obra.estado === "agendada" ? "Agendada" : obra.estado === "pendente" ? "Pendente" : obra.estado ? obra.estado.charAt(0).toUpperCase() + obra.estado.slice(1) : "Pendente",
    Duracao: obra.duracao || 1
  };
  if (obra.inicio) fields.DataInicio = obra.inicio + "T00:00:00";
  if (obra.condominio) fields.Condominio = obra.condominio;
  if (obra.sinistro) fields.NumeroSinistro = obra.sinistro;
  if (obra.cliente) fields.Cliente = obra.cliente;
  if (obra.clienteTel) fields.ClienteTel = obra.clienteTel;
  if (obra.clienteEmail) fields.ClienteEmail = obra.clienteEmail;
  if (obra.funcionarios?.length) fields.Funcionarios = obra.funcionarios.join("; ");
  if (obra.especialidades?.length) fields.Especialidades = JSON.stringify(obra.especialidades);
  if (obra.trabalhos?.length) fields.Trabalhos = JSON.stringify(obra.trabalhos);
  if (obra.notas) fields.Notas = obra.notas;
  return fields;
}

// Converte item do SharePoint → registo de horas da app
function spItemParaRegisto(item) {
  const f = item.fields || {};
  // Lookup fields: SharePoint retorna "ObraId" (o ID numérico do item)
  const obraSpId = f.ObraId || f.ObraLookupId || null;
  return {
    id: item.id,
    spId: item.id,
    data: f.Data ? f.Data.slice(0, 10) : "",
    obraId: obraSpId ? String(obraSpId) : null,
    obraSpId: obraSpId ? String(obraSpId) : null,
    funcionario: f.Funcionario || "",
    horas: parseFloat(f.Horas) || 0,
    custoHora: parseFloat(f.CustoHora) || CUSTO_HORA[f.Funcionario] || 0,
    notas: f.Notas || ""
  };
}

// Converte registo da app → campos para o SharePoint
function registoParaSPFields(registo, obras) {
  // Nomes das colunas confirmados pelo CSV: Título, Data, Obra, Funcionario, Horas, CustoHora, CustoTotal, Notas
  const obra = obras.find(o => String(o.id) === String(registo.obraId) || String(o.spId) === String(registo.obraId));
  const custoHora = CUSTO_HORA[registo.funcionario] || 0;
  const fields = {
    Title: `${registo.funcionario} · ${registo.data} · ${registo.horas}h`,
    Funcionario: registo.funcionario,
    Horas: registo.horas,
    CustoHora: custoHora,
    CustoTotal: registo.horas * custoHora
  };
  // Data em formato ISO
  if (registo.data) fields.Data = registo.data + "T00:00:00";
  // Campo Lookup: Graph API espera "ObraLookupId" (nome interno + LookupId)
  const obraSpId = obra?.spId || obra?.id;
  if (obraSpId) fields.ObraLookupId = parseInt(obraSpId);
  if (registo.notas) fields.Notas = registo.notas;
  return fields;
}

// ─── CRUD — MATERIAIS ──────────────────────────────────────────────────────────
function materialParaSPFields(mat, obras) {
  const obra = obras.find(o => String(o.id) === String(mat.obraId) || String(o.spId) === String(mat.obraId));
  const qtd = parseFloat(mat.quantidade) || 0;
  const cu = parseFloat(mat.custoUnitario) || 0;
  const pvpu = Math.round(cu * 1.30 * 100) / 100; // PVP = Custo + 30%
  const fields = {
    Title: mat.descricao || "Material",
    DescriçaoArtigo: mat.descricaoArtigo || "",
    Fornecedor: mat.fornecedor || "",
    Quantidade: qtd,
    Unidade: mat.unidade || "Un",
    CustoUnitario: cu,
    CustoTotal: Math.round(qtd * cu * 100) / 100,
    PVPUnitario: pvpu,
    PVPTotal: Math.round(qtd * pvpu * 100) / 100,
    Notas: mat.notas || ""
  };
  if (mat.data) fields.Data = mat.data + "T00:00:00";
  const obraSpId = obra?.spId || obra?.id;
  if (obraSpId) fields.ObraLookupId = parseInt(obraSpId);
  return fields;
}
function spItemParaMaterial(item) {
  const f = item.fields || {};
  const cu = parseFloat(f.CustoUnitario) || 0;
  const qtd = parseFloat(f.Quantidade) || 0;
  const pvpu = parseFloat(f.PVPUnitario) || Math.round(cu * 1.30 * 100) / 100;
  return {
    id: item.id,
    spId: item.id,
    obraId: f.ObraId || f.ObraLookupId || null,
    descricao: f.Title || "",
    descricaoArtigo: f["DescriçaoArtigo"] || f.DescricaoArtigo || "",
    fornecedor: f.Fornecedor || "",
    quantidade: qtd,
    unidade: f.Unidade || "Un",
    custoUnitario: cu,
    custoTotal: parseFloat(f.CustoTotal) || Math.round(qtd * cu * 100) / 100,
    pvpUnitario: pvpu,
    pvpTotal: parseFloat(f.PVPTotal) || Math.round(qtd * pvpu * 100) / 100,
    data: f.Data ? f.Data.slice(0, 10) : "",
    notas: f.Notas || ""
  };
}

  if (obra.cliente !== undefined) camposSimples.Cliente = obra.cliente || "";

  if (obra.trabalhos) camposSimples.Trabalhos = JSON.stringify(obra.trabalhos);
  console.log("PATCH campos simples:", JSON.stringify(camposSimples));
  await graphPatch(`/sites/${siteId}/lists/${listId}/items/${spId}/fields`, camposSimples);

  // Title actualizado via item (não via /fields)
  if (obra.titulo) {
    await graphPatch(`/sites/${siteId}/lists/${listId}/items/${spId}`, {
      fields: {
        Title: obra.titulo

  // Funcionarios: campo de texto com separador

    await graphPatch(`/sites/${siteId}/lists/${listId}/items/${spId}/fields`, {

// ─── LOOKUP DE SINISTROS (lista real do SharePoint) ──────────────────────────
// Pesquisa na lista "Listagem Sinistros" pelo número de sinistro.
// Os nomes dos campos abaixo devem corresponder às colunas reais da tua lista.
// Se os nomes forem diferentes, ajusta aqui o mapeamento.
// Cache da lista de sinistros para evitar chamadas repetidas
let _sinistrosCache = null;
let _condominiosCache = null; // Map de ID SharePoint → nome do condomínio

async function resolverNomeCondominio(siteId, lookupId) {
  if (!lookupId) return "";
  if (!_condominiosCache) {
    try {
      const listId = await resolverListId(SP_CONFIG.listaCondominios);
      const data = await graphGet(`/sites/${siteId}/lists/${listId}/items?$expand=fields&$top=500`);
      _condominiosCache = {};
      (data.value || []).forEach(item => {
        // Guarda por ID numérico do item (usado no LookupId)
        _condominiosCache[String(item.id)] = item.fields?.Title || "";
      });
      console.log("Condomínios carregados:", Object.keys(_condominiosCache).length);
    } catch (e) {
      console.warn("Erro a carregar condomínios:", e.message);
      _condominiosCache = {};
    }
  }
  return _condominiosCache[String(lookupId)] || "";
}
async function fetchSinistroPorNumero(numero) {
  try {
    const siteId = await resolverSiteId();
    const listId = await resolverListId(SP_CONFIG.listaSinistros);

    // Carrega todos os sinistros uma vez e guarda em cache
    if (!_sinistrosCache) {
      const data = await graphGet(`/sites/${siteId}/lists/${listId}/items?$expand=fields&$top=5000`);
      _sinistrosCache = (data.value || []).map(item => {
        const f = item.fields || {};
        // Colunas reais da lista "Listagem Sinistros" confirmadas pelo CSV
        return {
          // Mapeamento confirmado pelo console:
          // Title=OCORRÊNCIA, field_2=DataSinistro, Condom_x00ed_nioLookupId=lookup condomínio
          // field_8=Seguradora, Estado=campo choice de estado
          numeroSinistro: String(f.Title || ""),
          // Condomínio: campo Lookup — guardamos o ID para resolver depois
          condominio: f.field_3 && typeof f.field_3 === "string" ? f.field_3 : "",
          condominioid: f["Condom_x00ed_nioLookupId"] || null,
          morada: "",
          apolice: "",
          seguradora: f.field_8 || "",
          tomador: "",
          tomadorTel: "",
          tomadorEmail: "",
          perito: "",
          dataParticipacao: typeof f.field_2 === "string" ? f.field_2.slice(0, 10) : "",
          dataVistoria: "",
          estadoSinistro: f.Estado || "",
          descricao: typeof f.field_9 === "string" ? f.field_9.slice(0, 300) : "",
          processo: String(f["N_x00ba_Processo"] || f.field_1 || "")
        };
      }).filter(s => s.numeroSinistro);
      // Resolve nomes de condomínio por LookupId para sinistros sem field_3
      for (const s of _sinistrosCache) {
        if (!s.condominio && s.condominioid) {
          s.condominio = await resolverNomeCondominio(siteId, s.condominioid).catch(() => "");
        }
      }
      console.log("Sinistros carregados:", _sinistrosCache.length);
      if (data.value?.length > 0) {
        const campos = Object.keys(data.value[0].fields || {});
        console.log("Campos sinistro:", campos);
        // Log completo do primeiro item para debug de mapeamento
        const f0 = data.value[0].fields;
        const useful = Object.entries(f0).filter(([k, v]) => v && !k.startsWith("_") && !k.startsWith("@")).slice(0, 20);
        console.log("1º sinistro campos úteis:", JSON.stringify(Object.fromEntries(useful)));
      }
    }

    // Filtra localmente
    const resultados = _sinistrosCache.filter(s => s.numeroSinistro.toLowerCase().includes(numero.toLowerCase()));
    // Condomínio já vem como texto em field_3 — sem necessidade de resolução
    return resultados;
  } catch (err) {
    console.warn("Lookup sinistro falhou:", err.message);
    _sinistrosCache = null; // Reset cache para tentar novamente
    return [];
  }
}
