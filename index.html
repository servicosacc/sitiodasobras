function addDays(s, n) {
  const d = new Date(s + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function fimObra(o) {
  return addDays(o.inicio, (o.duracao || 1) - 1);
}
function toDate(s) {
  return new Date(s + "T00:00:00");
}
function fmt(d) {
  if (!d) return "—";
  return toDate(d).toLocaleDateString("pt-PT", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  });
}

// ─── AUTENTICAÇÃO MSAL ────────────────────────────────────────────────────────
// MSAL está incorporado directamente no HTML (não carrega de CDN externo)
async function carregarMSAL() {
  // window.msal é injectado pelo script MSAL inline no HTML
  if (window.msal) return window.msal;
  throw new Error("MSAL não carregado — verifica o ficheiro HTML");
}
let _msalInstance = null;
async function getMSAL() {
  if (_msalInstance) return _msalInstance;
  const msal = await carregarMSAL();
  // Usa o URL actual como redirect (funciona tanto no GitHub Pages como no SharePoint)
  const redirectUri = window.location.href.split("?")[0].split("#")[0];
  // MSAL v5 usa createStandardPublicClientApplication
  const msalLib = window.msal;
  const config = {
    auth: {
      clientId: SP_CONFIG.clientId,
      authority: `https://login.microsoftonline.com/${SP_CONFIG.tenantId}`,
      redirectUri: redirectUri,
      navigateToLoginRequestUrl: true
    },
    cache: {
      cacheLocation: "sessionStorage",
      storeAuthStateInCookie: true
    }
  };
  if (msalLib.createStandardPublicClientApplication) {
    _msalInstance = await msalLib.createStandardPublicClientApplication(config);
  } else {
    _msalInstance = new msalLib.PublicClientApplication(config);
    await _msalInstance.initialize();
  }
  return _msalInstance;
}
async function getAccessToken() {
  if (_accessToken) return _accessToken;
  const msalInstance = await getMSAL();
  const scopes = ["https://graph.microsoft.com/Sites.ReadWrite.All"];

  // Verifica se há resposta de redirect pendente (após login)
  try {
    const redirectResp = await msalInstance.handleRedirectPromise();
    if (redirectResp?.accessToken) {
      _accessToken = redirectResp.accessToken;
      return _accessToken;
    }
  } catch (e) {
    console.warn("handleRedirectPromise:", e);
  }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      // Tenta token silencioso (já autenticado)
      const resp = await msalInstance.acquireTokenSilent({
        scopes,
        account: accounts[0]
      });
      _accessToken = resp.accessToken;
      return _accessToken;
    } catch (e) {
      // Token silencioso falhou — faz redirect para login
      await msalInstance.acquireTokenRedirect({
        scopes,
        account: accounts[0]
      });
      return null; // página vai recarregar após redirect
    }
  } else {
    // Nenhuma conta — inicia login por redirect
    await msalInstance.loginRedirect({
      scopes,
      redirectUri: window.location.href.split("?")[0].split("#")[0]
    });
    return null; // página vai recarregar após redirect
  }
}

// ─── GRAPH API — HELPERS ──────────────────────────────────────────────────────
async function graphGet(url) {
  const token = await getAccessToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${url}`, {
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    }
  });
  if (!res.ok) throw new Error(`Graph GET falhou: ${res.status} ${url}`);
  return res.json();
}
async function graphPost(url, body) {
  const token = await getAccessToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${url}`, {
    method: "POST",
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Graph POST falhou: ${res.status} ${url}`);
  return res.json();
}
async function graphPatch(url, body) {
  const token = await getAccessToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${url}`, {
    method: "PATCH",
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Graph PATCH falhou: ${res.status} ${url}`);
  return res.json();
}
async function graphDelete(url) {
  const token = await getAccessToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${url}`, {
    method: "DELETE",
    headers: {
      Authorization: `Bearer ${token}`
    }
  });
  if (!res.ok) throw new Error(`Graph DELETE falhou: ${res.status} ${url}`);
}

// ─── RESOLVER SITE ID E LIST IDs ──────────────────────────────────────────────
async function resolverSiteId() {
  if (_siteId) return _siteId;
  // Extrai hostname e caminho do siteUrl
  const url = new URL(SP_CONFIG.siteUrl);
  const hostname = url.hostname; // accaocondominios.sharepoint.com
  const sitePath = url.pathname; // /sites/GESTAOSINISTROS
  const data = await graphGet(`/sites/${hostname}:${sitePath}`);
  _siteId = data.id;
  return _siteId;
}
async function resolverListId(nomeLista) {
  if (_listIds[nomeLista]) return _listIds[nomeLista];
  const siteId = await resolverSiteId();
  const data = await graphGet(`/sites/${siteId}/lists?$filter=displayName eq '${encodeURIComponent(nomeLista)}'`);
  if (!data.value?.length) throw new Error(`Lista não encontrada: ${nomeLista}`);
  _listIds[nomeLista] = data.value[0].id;
  return _listIds[nomeLista];
}

    trabalhos: f.Trabalhos ? JSON.parse(f.Trabalhos) : [],

}

function obraParaSPFields(obra) {

    Estado: obra.estado.charAt(0).toUpperCase() + obra.estado.slice(1),

    Trabalhos: JSON.stringify(obra.trabalhos || []),
    Notas: obra.notas || ""
  };
}

// Converte item do SharePoint → registo de horas da app
function spItemParaRegisto(item) {
  const f = item.fields || {};
  return {
    id: item.id,
    spId: item.id,
    data: f.Data ? f.Data.slice(0, 10) : "",
    obraId: f.ObraId || f.ObraLookupId || null,
    // lookup retorna ObraLookupId
    obraSpId: f.ObraLookupId || f.ObraId || null,
    funcionario: f.Funcionario || "",
    horas: parseFloat(f.Horas) || 0,
    custoHora: parseFloat(f.CustoHora) || CUSTO_HORA[f.Funcionario] || 0,
    notas: f.Notas || ""
  };
}

// Converte registo da app → campos para o SharePoint
function registoParaSPFields(registo, obras) {
  const obra = obras.find(o => String(o.id) === String(registo.obraId) || String(o.spId) === String(registo.obraId));
  const custoHora = CUSTO_HORA[registo.funcionario] || 0;
  return {
    Title: `${registo.funcionario} · ${registo.data} · ${registo.horas}h`,
    Data: registo.data,
    "ObraLookupId": obra?.spId || obra?.id || null,
    // campo Lookup
    Funcionario: registo.funcionario,
    Horas: registo.horas,
    CustoHora: custoHora,
    CustoTotal: registo.horas * custoHora,
    Notas: registo.notas || ""
  };
}

    // Mapeia os campos da lista de sinistros para a estrutura esperada pela app
    // ⚠️ Ajustar os nomes dos campos (f.XYZ) conforme as colunas reais da tua lista
    return (data.value || []).map(item => {
      const f = item.fields || {};
      return {
        numeroSinistro: f.Title || f.NumeroSinistro || "",
        condominio: f.Condominio || f.NomeCondominio || "",
        morada: f.Morada || f.LocalSinistro || "",
